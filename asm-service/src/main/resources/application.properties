spring.application.name=asm-service
server.port = 8083

spring.profiles.active=dev

# true - Stub client active in dev (PES not running locally)
# false - real feign client that calls pes-service
asm.interview-result-client.stub=false

spring.cloud.service-url.defaultZone=http://localhost:8761/eureka/
spring.instance.prefer-ip-address=true

# DEBUG, INFO, WARN, ERROR
logging.level.root=INFO