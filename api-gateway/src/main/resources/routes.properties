# Configuration for the API Gateway
spring.cloud.gateway.server.webmvc.routes[0].id=auth-manager
spring.cloud.gateway.server.webmvc.routes[0].uri=lb://auth-manager
spring.cloud.gateway.server.webmvc.routes[0].predicates[0]=Path=/user/**,/auth/**

spring.cloud.gateway.server.webmvc.routes[1].id=cat-service
spring.cloud.gateway.server.webmvc.routes[1].uri=lb://cat-service
spring.cloud.gateway.server.webmvc.routes[1].predicates[0]=Path=/courses/**,/stages/**,/technologies/**

spring.cloud.gateway.server.webmvc.routes[2].id=asm-service
spring.cloud.gateway.server.webmvc.routes[2].uri=lb://asm-service
spring.cloud.gateway.server.webmvc.routes[2].predicates[0]=Path=/assessments/**

# Swagger/OpenAPI routes for aggregated documentation
spring.cloud.gateway.server.webmvc.routes[3].id=auth-manager-api-docs
spring.cloud.gateway.server.webmvc.routes[3].uri=lb://auth-manager
spring.cloud.gateway.server.webmvc.routes[3].predicates[0]=Path=/v3/api-docs/auth-manager
spring.cloud.gateway.server.webmvc.routes[3].filters[0]=RewritePath=/v3/api-docs/auth-manager, /v3/api-docs

spring.cloud.gateway.server.webmvc.routes[4].id=cat-service-api-docs
spring.cloud.gateway.server.webmvc.routes[4].uri=lb://cat-service
spring.cloud.gateway.server.webmvc.routes[4].predicates[0]=Path=/v3/api-docs/cat-service
spring.cloud.gateway.server.webmvc.routes[4].filters[0]=RewritePath=/v3/api-docs/cat-service, /v3/api-docs

spring.cloud.gateway.server.webmvc.routes[5].id=asm-service-api-docs
spring.cloud.gateway.server.webmvc.routes[5].uri=lb://asm-service
spring.cloud.gateway.server.webmvc.routes[5].predicates[0]=Path=/v3/api-docs/asm-service
spring.cloud.gateway.server.webmvc.routes[5].filters[0]=RewritePath=/v3/api-docs/asm-service, /v3/api-docs
