# Configuration for the API Gateway
spring.cloud.gateway.server.webmvc.routes[0].id=auth-manager
spring.cloud.gateway.server.webmvc.routes[0].uri=lb://auth-manager
spring.cloud.gateway.server.webmvc.routes[0].predicates[0]=Path=/user/**,/auth/**

spring.cloud.gateway.server.webmvc.routes[1].id=cat
spring.cloud.gateway.server.webmvc.routes[1].uri=lb://cat
spring.cloud.gateway.server.webmvc.routes[1].predicates[0]=Path=/courses/**,/stages/**,/technologies/**

spring.cloud.gateway.server.webmvc.routes[3].id=pes-service
spring.cloud.gateway.server.webmvc.routes[3].uri=lb://pes-service
spring.cloud.gateway.server.webmvc.routes[3].predicates[0]=Path=/evaluations/**
spring.cloud.gateway.server.webmvc.routes[3].predicates[1]=Path=/reviews/**
spring.cloud.gateway.server.webmvc.routes[3].predicates[2]=Path=/projects
