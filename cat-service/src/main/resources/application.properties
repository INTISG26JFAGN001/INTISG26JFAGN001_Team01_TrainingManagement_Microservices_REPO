spring.application.name=cat-service
spring.profiles.active=dev
server.port=8081

# Configuration for Eureka client
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true

# OpenAPI Configuration - Use API Gateway URL for Swagger UI
springdoc.api-docs.servers[0].url=http://localhost:8000
springdoc.api-docs.servers[0].description=API Gateway

