spring.application.name=CONFIG-SERVER

# Configuration for the Discovery Client
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.ip-address=127.0.0.1
eureka.instance.prefer-ip-address=true

# Configuration for Tomcat Server
server.port=8888

# Configuration for Spring Cloud Config Server
spring.cloud.config.server.git.uri=http://github.com/ShubhrajitSarkar7479/INTISG26JFAGN001_Team01_Cloud_Config_REPO.git
spring.cloud.config.server.git.default-label=main

